<!--
  Path:     public/index.html
  Purpose:  AI Tech Pack Comparator v2 主頁面 — 4 tab + Excel Export + 7-step 進度條
  Depends:  public/theme.js, public/app.js, Tailwind CDN, SheetJS CDN
  Notes:    繁體中文(香港) UI；License Key 由 localStorage 記住；PDF.js Phase 6 上線，
            目前用 textarea 貼 rawText
-->
<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Tech Pack Comparator v2</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script>
    // Tailwind 主題 — 預設 dark / light 切換靠 html.classList
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 500: '#2563eb', 600: '#1d4ed8', 700: '#1e3a8a' }
          }
        }
      }
    };
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

  <!-- ── Top bar ─────────────────────────────────────────── -->
  <header class="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">
      <h1 class="text-lg sm:text-xl font-semibold tracking-tight">
        AI Tech Pack Comparator <span class="text-xs font-mono text-slate-500 align-top">v2.0.0</span>
      </h1>
      <div class="flex-1"></div>
      <span id="provider-pill"
        class="hidden sm:inline-flex items-center gap-1 text-xs font-mono px-2 py-1 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300">
        provider: <span id="provider-name">—</span>
      </span>
      <button id="theme-toggle"
        class="rounded-md p-2 hover:bg-slate-200 dark:hover:bg-slate-800 transition"
        title="切換主題" aria-label="切換主題">
        <span class="block dark:hidden">🌙</span>
        <span class="hidden dark:block">☀️</span>
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <!-- ── License + Input panel ─────────────────────────── -->
    <section class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5 space-y-4">
      <div class="flex flex-col sm:flex-row gap-3 sm:items-end">
        <div class="flex-1">
          <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" for="license-key">
            License Key
          </label>
          <input id="license-key" type="text" autocomplete="off" spellcheck="false"
            class="w-full px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
            placeholder="輸入您的 License Key (例: USER-DEMO-001)" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" for="style-number">
            款式編號 (StyleNumber)
          </label>
          <input id="style-number" type="text" value="STYLE-DEMO-001"
            class="w-full sm:w-56 px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
        </div>
      </div>

      <fieldset class="space-y-2">
        <legend class="text-xs font-medium text-slate-500 dark:text-slate-400">輸出模式 (Output Mode)</legend>
        <div id="output-mode-group" class="flex flex-wrap gap-2 text-sm">
          <!-- radio buttons rendered by app.js -->
        </div>
      </fieldset>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" for="old-text">
            舊版 Tech Pack 文字內容 (從 PDF 複製貼上)
          </label>
          <textarea id="old-text" rows="10" spellcheck="false"
            class="w-full px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 font-mono text-xs focus:outline-none focus:ring-2 focus:ring-brand-500"
            placeholder="貼上舊版 Tech Pack 的純文字內容…"></textarea>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" for="new-text">
            新版 Tech Pack 文字內容 (從 PDF 複製貼上)
          </label>
          <textarea id="new-text" rows="10" spellcheck="false"
            class="w-full px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 font-mono text-xs focus:outline-none focus:ring-2 focus:ring-brand-500"
            placeholder="貼上新版 Tech Pack 的純文字內容…"></textarea>
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-3 pt-2">
        <button id="run-btn"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-md bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium shadow-sm disabled:opacity-50 disabled:cursor-not-allowed transition">
          <span>▶ 開始比對</span>
        </button>
        <button id="export-btn" disabled
          class="inline-flex items-center gap-2 px-4 py-2 rounded-md border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed transition">
          <span>⬇ 匯出 Excel</span>
        </button>
        <span id="status-msg" class="text-xs text-slate-500 dark:text-slate-400"></span>
        <div class="flex-1"></div>
        <span id="duration-pill" class="hidden text-xs font-mono px-2 py-1 rounded bg-slate-200 dark:bg-slate-800"></span>
        <span id="tokens-pill" class="hidden text-xs font-mono px-2 py-1 rounded bg-slate-200 dark:bg-slate-800"></span>
      </div>
    </section>

    <!-- ── Progress bar (7-step agent pipeline) ──────────── -->
    <section id="progress-section" class="hidden rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
      <h2 class="text-sm font-semibold mb-3">處理進度</h2>
      <ol id="progress-list" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-2 text-xs">
        <!-- step chips rendered by app.js -->
      </ol>
    </section>

    <!-- ── Tabs ─────────────────────────────────────────── -->
    <section id="result-section" class="hidden rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 overflow-hidden">
      <nav class="flex flex-wrap border-b border-slate-200 dark:border-slate-800 text-sm">
        <button data-tab="summary"      class="tab-btn px-4 py-3 border-b-2 border-brand-500 font-medium">總結</button>
        <button data-tab="measurement"  class="tab-btn px-4 py-3 border-b-2 border-transparent hover:bg-slate-100 dark:hover:bg-slate-800">尺寸變更</button>
        <button data-tab="comments"     class="tab-btn px-4 py-3 border-b-2 border-transparent hover:bg-slate-100 dark:hover:bg-slate-800">註解 &amp; 圖像</button>
        <button data-tab="bom"          class="tab-btn px-4 py-3 border-b-2 border-transparent hover:bg-slate-100 dark:hover:bg-slate-800">物料清單 (BOM)</button>
        <button data-tab="qa"           class="tab-btn px-4 py-3 border-b-2 border-transparent hover:bg-slate-100 dark:hover:bg-slate-800">QA Review</button>
        <button data-tab="debug"        class="tab-btn px-4 py-3 border-b-2 border-transparent hover:bg-slate-100 dark:hover:bg-slate-800 hidden" id="tab-debug">Debug</button>
      </nav>
      <div class="p-5">
        <div id="tab-panel-summary"     class="tab-panel"></div>
        <div id="tab-panel-measurement" class="tab-panel hidden"></div>
        <div id="tab-panel-comments"    class="tab-panel hidden"></div>
        <div id="tab-panel-bom"         class="tab-panel hidden"></div>
        <div id="tab-panel-qa"          class="tab-panel hidden"></div>
        <div id="tab-panel-debug"       class="tab-panel hidden"></div>
      </div>
    </section>

    <!-- ── Error panel ──────────────────────────────────── -->
    <section id="error-section" class="hidden rounded-xl border border-red-300 dark:border-red-800 bg-red-50 dark:bg-red-950/40 p-5">
      <h2 class="text-sm font-semibold text-red-700 dark:text-red-300 mb-2">執行失敗</h2>
      <pre id="error-body" class="text-xs font-mono whitespace-pre-wrap text-red-700 dark:text-red-300"></pre>
    </section>

    <footer class="text-xs text-slate-500 dark:text-slate-500 pt-4 text-center">
      Provider 鎖定 Perplexity Sonar Pro · UI 繁中(HK) · v2.0.0 · KI-006 ✅ · KI-008 (鎖定設計決定)
    </footer>
  </main>

  <script type="module" src="./theme.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
